name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="schduler-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/schduler
          sha256sum "$out" | tee "$out.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: schduler-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            schduler-${{ matrix.goos }}-${{ matrix.goarch }}
            schduler-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: schduler-*

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist -type f \( -name 'schduler-*' -o -name '*.sha256' \) -exec mv {} release-assets/ \;
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}.0
          name: Release v0.${{ github.run_number }}.0
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
