# slacksched 示例配置。Slack 令牌只写在环境变量里，此处只写变量名，勿把 xoxb/xapp 写入仓库。

logging:
  # slog 级别：debug | info | warn | error；留空等价于 info
  level: info
  # 为 true 时打印 Provider 标准输入输出上的每条 JSON-RPC（大时会截断）
  acp_trace: true
  # 为 true 时在 slack_inbound / slack_outbound 日志里附带截断后的消息预览
  slack_trace: true
  # 可选：除终端外，把相同文本日志追加写入该文件（不存在则创建）
  # file_path: .scheduler/slacksched.log

slack:
  # Bot User OAuth Token（xoxb-…）所在环境变量名
  bot_token_env: SLACK_BOT_TOKEN
  # App-Level Token（xapp-…，Socket Mode）所在环境变量名
  app_token_env: SLACK_APP_TOKEN
  # 为 true 时 Bot 回复也出现在频道主时间线；多数场景用 false，仅在线程内可见
  default_reply_broadcast: false
  # 私聊（DM）允许的发送者 Slack User ID（U…）。为空则不接受任何 DM
  allowed_dm_user_ids: []
  # 允许发起会话的频道 ID（C…）。为空 [] 表示在满足下方提及规则等前提下任意频道均可
  allowed_channel_ids: []
  # 频道内是否每条消息都必须 @ 本应用（含同线程后续回复）；IM 不受此限制
  require_mention_in_channels: true

  # 为 true 时在 Provider 运行期间调用 assistant.threads.setStatus；发帖成功后由 Slack 清状态
  assistant_status: true
  # 状态后缀文案（Slack 展示为「应用名 is …」）；空则使用内置英文默认
  assistant_status_text: "Working on your request…"
  # assistant_live_status 为 false 时的轮播 loading 文案（最多 10 条）；live 为 true 时常被内置文案覆盖
  assistant_loading_messages: []
  # 为 true 时根据 Cursor stream-json / Codex 流式事件刷新状态与 loading 文案
  assistant_live_status: true

  # 为 true 时：在每次 Prompt 前把同线程历史写入工作区 AGENTS.md「Slack 会话上下文」（不塞进用户原文）
  thread_replies_in_prompt: false
  # 本机监听地址，非空则启动按需拉取线程的 HTTP Context API（需 Bot 具备 conversations.replies 等权限）
  context_api_listen: "127.0.0.1:9847"
  # 拉取线程时的条数上限；0 表示使用内置默认（100）
  thread_replies_max_messages: 100
  # 写入 AGENTS 的线程摘录字符上限；0 表示使用内置默认（约 12000）
  thread_replies_max_chars: 12000
  # 为 false 时关闭出站 Markdown → Slack mrkdwn 转换；留空或未写则默认开启
  convert_outbound_markdown: true
  # 为 false 时关闭「系统信封」（定位字段 + 本条聚焦 + 引用块内原文）；留空或未写则默认开启
  # turn_envelope: true

scheduler:
  # 每 Slack 线程一份工作区目录的根路径（相对路径相对进程工作目录）
  workspaces_root: .scheduler/workspaces
  # 写入会话前读取的 Agent 模板文件（须已存在）
  agent_md_template_path: .scheduler/AGENTS.template.md
  # 模板与调度器生成段合并后写入工作区根目录的文件名（如 AGENTS.md）
  agent_md_filename: AGENTS.md
  # 可选：复制到工作区 references/slack-mrkdwn-guide.md，给出站 mrkdwn 参考
  # slack_mrkdwn_guide_path: docs/slack-mrkdwn-guide.md
  # 可选：每个新 session workspace 创建后、Provider 启动前执行的 bash 命令。
  # 命令通过 bash -lc 执行，工作目录为新 workspace；非零退出会中止 session 创建。
  # 可用环境变量：SCHDULER_SESSION_WORKSPACE、SCHDULER_SESSION_TEAM_ID、
  # SCHDULER_SESSION_CHANNEL_ID、SCHDULER_SESSION_ROOT_THREAD_TS
  # pre_session_command: 'printf "session initialized\n" > .session-init'

  # Provider 进程空闲超过此时长后关闭（与 session_idle_timeout 取较短者参与判定）
  provider_idle_timeout: 12h
  # 关闭 Provider 时先 SIGTERM，等待多久再 SIGKILL
  provider_shutdown_timeout: 10s
  # 会话级空闲超时，常与 provider_idle_timeout 对齐；单位可用 h、m、s
  session_idle_timeout: 4h
  # 单次 Prompt 调用的最长等待时间
  prompt_timeout: 2h
  # 会话结束对工作区：delete_on_session_close 删除；archive_on_session_close 归档
  workspace_retention: delete_on_session_close

providers:
  # 默认使用的 profile 名，必须在 profiles 下存在
  default: cursor
  # 另可选用 transport: acp（留空 transport 等价于 acp）：长连接标准输入输出 JSON-RPC
  profiles:
    # transport: codex_app_server — codex app-server --listen stdio://，JSON-RPC thread/turn
    codex:
      transport: codex_app_server
      command: codex
      args: []
      model: ""
      mode: yolo
      env: {}
    # transport: cursor_cli — cursor-agent chat，核心参数由调度器拼装；args 仅填额外参数
    cursor:
      transport: cursor_cli
      command: cursor-agent
      model: auto
      args: []
      mode: yolo
      env: {}
